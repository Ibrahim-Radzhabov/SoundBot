version: "3.9"

services:
  backend:
    build: ./backend
    environment:
      TELEGRAM_BOT_TOKEN: "replace_me"
      JWT_SECRET: "replace_me"
      CORS_ORIGINS: "*"
    expose:
      - "8000"

  backend-nginx:
    image: nginx:1.25-alpine
    depends_on:
      - backend
    ports:
      - "8000:80"
    volumes:
      - ./backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: "http://localhost:8000"
    ports:
      - "3000:80"
